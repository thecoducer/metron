services:
  app:
    build: .
    container_name: metron-app
    restart: unless-stopped
    networks:
      - metron-net
    volumes:
      - ./config:/app/config:ro
      - ./.env:/app/.env:ro
      - ./logs:/app/logs
    environment:
      - PORT=8000
    expose:
      - "8000"
    depends_on:
      loki:
        condition: service_healthy
    # Healthcheck defined in Dockerfile; compose inherits it.

  # --- Grafana + Loki observability stack ---
  loki:
    image: grafana/loki:3.5.0
    container_name: metron-loki
    restart: unless-stopped
    networks:
      - metron-net
    volumes:
      - loki-data:/loki
      - ./grafana/loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    expose:
      - "3100"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:3.5.0
    container_name: metron-promtail
    restart: unless-stopped
    networks:
      - metron-net
    volumes:
      - ./grafana/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/metron:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:12.0.0
    container_name: metron-grafana
    restart: unless-stopped
    networks:
      - metron-net
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-metron}
      - GF_SERVER_ROOT_URL=https://metron-logs.thecoducer.com
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_EXPLORE_ENABLED=true
    ports:
      - "3000:3000"
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  tunnel:
    build:
      context: .
      dockerfile: Dockerfile.tunnel
    container_name: metron-tunnel
    restart: "no"
    networks:
      - metron-net
    depends_on:
      app:
        condition: service_healthy
      grafana:
        condition: service_healthy
    volumes:
      - ~/.cloudflared:/cloudflared:ro
      - ./cloudflared-docker.yml:/etc/cloudflared/config.yml:ro
    environment:
      - APP_URL=http://app:8000
      - TUNNEL_NAME=metron-tunnel
      - TUNNEL_CONFIG=/etc/cloudflared/config.yml
      - HEALTHCHECK_INTERVAL=5

networks:
  metron-net:

volumes:
  loki-data:
  grafana-data:
