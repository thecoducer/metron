# ─────────────────────────────────────────────────────────────
# Metron — CI/CD Pipeline
#
# Triggers:
#   • Push to main  → test → deploy Cloud Run → deploy Firebase
#   • PR to main    → test only
#   • Manual        → test → deploy (optional)
#
# Auth: Workload Identity Federation (keyless — no SA key needed)
#   Pool:     projects/<PROJECT_NUMBER>/locations/global/workloadIdentityPools/github
#   Provider: github-actions
#   SA:       591669245036-compute@developer.gserviceaccount.com
#
# Required GCP Secret Manager secrets (already configured):
#   flask-secret-key, zerodha-token-secret,
#   firebase-credentials, google-oauth-credentials
# ─────────────────────────────────────────────────────────────
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: extreme-outpost-480113-c6
  GCP_PROJECT_NUMBER: "591669245036"
  GCP_REGION: asia-south1
  SERVICE_NAME: metron
  FIREBASE_SITE: metron
  WIF_PROVIDER: projects/591669245036/locations/global/workloadIdentityPools/github/providers/github-actions
  WIF_SERVICE_ACCOUNT: 591669245036-compute@developer.gserviceaccount.com

# ─────────────────────────────────────────────────────────────
jobs:

  # ── Test ────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --tb=short -q

      - name: Test summary
        if: always()
        run: |
          echo "### Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Python:** 3.12" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

  # ── Deploy to Cloud Run ─────────────────────────────────────
  deploy-cloud-run:
    name: Deploy → Cloud Run
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      revision: ${{ steps.info.outputs.revision }}
      url: ${{ steps.info.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Resolve existing Cloud Run URL
        id: existing
        run: |
          URL=$(gcloud run services describe "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='value(status.url)' 2>/dev/null || echo "")
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --source=. \
            --platform=managed \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=1 \
            --timeout=1800s \
            --concurrency=80 \
            --set-env-vars="FLASK_ENV=production,CLOUD_RUN_URL=${{ steps.existing.outputs.url }}" \
            --set-secrets="\
          FLASK_SECRET_KEY=flask-secret-key:latest,\
          ZERODHA_TOKEN_SECRET=zerodha-token-secret:latest,\
          FIREBASE_CREDENTIALS=firebase-credentials:latest,\
          GOOGLE_OAUTH_CREDENTIALS=google-oauth-credentials:latest" \
            --port=8080 \
            --quiet

      - name: Ensure CLOUD_RUN_URL env var is set
        run: |
          DEPLOYED_URL=$(gcloud run services describe "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='value(status.url)')
          PRE_DEPLOY_URL="${{ steps.existing.outputs.url }}"
          if [[ -z "$PRE_DEPLOY_URL" || "$PRE_DEPLOY_URL" != "$DEPLOYED_URL" ]]; then
            echo "CLOUD_RUN_URL was '${PRE_DEPLOY_URL}' — updating to '${DEPLOYED_URL}'"
            gcloud run services update "$SERVICE_NAME" \
              --project="$GCP_PROJECT_ID" \
              --region="$GCP_REGION" \
              --update-env-vars="CLOUD_RUN_URL=$DEPLOYED_URL" \
              --quiet
          else
            echo "CLOUD_RUN_URL already correct: $DEPLOYED_URL"
          fi

      - name: Get deployment info
        id: info
        run: |
          REVISION=$(gcloud run revisions list \
            --service="$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --sort-by=~CREATED \
            --limit=1 \
            --format='value(name)')
          URL=$(gcloud run services describe "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='value(status.url)')
          echo "revision=$REVISION" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "### Cloud Run Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Revision:** \`$REVISION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** $URL" >> "$GITHUB_STEP_SUMMARY"

  # ── Deploy to Firebase Hosting ──────────────────────────────
  deploy-firebase:
    name: Deploy → Firebase Hosting
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: deploy-cloud-run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Set deploy target
        run: firebase target:apply hosting metron metron --project="$GCP_PROJECT_ID" 2>/dev/null || true

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting:metron --project="$GCP_PROJECT_ID"

      - name: Deployment summary
        run: |
          echo "### Firebase Hosting" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Site:** https://${{ env.FIREBASE_SITE }}.web.app" >> "$GITHUB_STEP_SUMMARY"


