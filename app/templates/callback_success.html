<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Authentication Successful</title>
        <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: white;
        }
        .message {
            text-align: center;
            padding: 20px;
        }
        .checkmark {
            color: #4CAF50;
            font-size: 48px;
            margin-bottom: 15px;
        }
        h1 {
            color: #333;
            font-size: 24px;
            font-weight: 500;
            margin: 0 0 10px 0;
        }
        p {
            color: #666;
            font-size: 14px;
            margin: 0;
        }
        </style>
    </head>
    <body>
        <div class="message">
            <div class="checkmark">✓</div>
            <h1>Authentication Successful</h1>
            <p>You can close this tab now.</p>
        </div>
        <script>
        (function() {
            // Notify the main app tab that Zerodha login succeeded
            try {
                var ch = new BroadcastChannel('zerodha_auth');
                ch.postMessage({ type: 'login_success' });
                ch.close();
            } catch (e) { /* BroadcastChannel not supported — tab-visible fallback */ }

            // Try multiple methods to close the window
            window.close();
            setTimeout(function() {
                window.open('', '_self', '');
                window.close();
            }, 500);
        })();
        </script>
    </body>
</html>
