<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Nifty 50 Stocks</title>
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
              rel="stylesheet">
        <link rel="stylesheet" href="/static/css/styles.css?v={{ v }}">
        <link rel="stylesheet" href="/static/css/nav-header.css?v={{ v }}">
        <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
        <link rel="icon" href="/static/images/favicon.ico" sizes="48x48">
        <link rel="apple-touch-icon" href="/static/images/apple-touch-icon.png">
        <link rel="manifest" href="/static/manifest.json">
        <meta name="theme-color" content="#0f172a">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style"
              content="black-translucent">
        <meta name="apple-mobile-web-app-title" content="Metron">
        <link rel="preload" href="/static/js/nifty50.js?v={{ v }}" as="script">
        <link rel="modulepreload" href="/static/js/index-ticker.js?v={{ v }}">
    </head>
    <body>
        <script>
  // Apply saved theme immediately (before first paint) to prevent flash
  (function() {
    var t = localStorage.getItem('theme');
    if (t === 'dark') document.body.classList.add('dark-theme');
  })();
        </script>
        <div class="container">
            {% include 'partials/nav_header.html' %}
            <div class="overview-tickers market-tickers-row">
                <div class="index-tickers" id="indexTickers">
                    <!-- Ticker items rendered dynamically by IndexTicker -->
                </div>
            </div>
            <div class="page-title-bar">
                <h1 id="header-title">Nifty 50</h1>
                <div class="page-title-right">
                    <button class="refresh-btn" id="refresh_btn" onclick="triggerRefresh()">
                        <svg class="refresh-icon"
                             width="15"
                             height="15"
                             viewBox="0 0 24 24"
                             fill="none"
                             stroke="currentColor"
                             stroke-width="2"
                             stroke-linecap="round"
                             stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10" /><polyline points="1 20 1 14 7 14" />
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                        </svg>
                        <span class="refresh-label">Refresh</span>
                    </button>
                    <div id="status_tag">
                        <span class="status-dot"></span>
                        <span id="status_text">loading...</span>
                    </div>
                </div>
            </div>
            <div class="section-wrapper" id="nifty50-section">
                <div class="section-header">
                    <div class="nifty50-controls">
                        <div class="pagination-controls">
                            <label for="nifty50_page_size">Show:</label>
                            <select id="nifty50_page_size"
                                    onchange="window.changeNifty50PageSize(this.value)">
                                <option value="10">10</option>
                                <option value="25">25</option>
                                <option value="50" selected>50</option>
                                <option value="100">All</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="table-scroll-wrapper">
                    <table id="nifty50Table" aria-label="Nifty 50 table">
                        <thead>
                            <tr>
                                <th data-sort-asc="symbol_asc"
                                    data-sort-desc="symbol_desc"
                                    data-sort-default="asc">Symbol</th>
                                <th data-sort-asc="name_asc"
                                    data-sort-desc="name_desc"
                                    data-sort-default="asc">Company</th>
                                <th data-sort-asc="ltp_asc" data-sort-desc="ltp_desc">LTP</th>
                                <th data-sort-asc="change_asc" data-sort-desc="change_desc">Change</th>
                                <th data-sort-asc="open_asc" data-sort-desc="open_desc">Open</th>
                                <th data-sort-asc="high_asc" data-sort-desc="high_desc">High</th>
                                <th data-sort-asc="low_asc" data-sort-desc="low_desc">Low</th>
                                <th data-sort-asc="close_asc" data-sort-desc="close_desc">Prev Close</th>
                            </tr>
                        </thead>
                        <tbody id="nifty50_tbody">
                            <tr class="loading-placeholder" id="nifty50_table_loading">
                                <td colspan="8">
                                    <span class="loading-dots">Loading data</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="pagination-info" id="nifty50_pagination_info"></div>
                <div class="pagination-buttons" id="nifty50_pagination_buttons"></div>
            </div>
            <div class="footer-note">Data sources: NSE, Yahoo Finance</div>
        </div>
        {% include 'partials/footer.html' %}
        <script src="/static/js/nav.js?v={{ v }}"></script>
        <script src="/static/js/router.js?v={{ v }}"></script>
        <script type="module" src="/static/js/nifty50.js?v={{ v }}"></script>
        <link rel="stylesheet" href="/static/css/pwa-install.css?v={{ v }}">
        <script src="/static/js/pwa-install.js?v={{ v }}"></script>
        <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/service-worker.js');}</script>
        <!-- Nav Drawer -->
        {% include 'partials/nav_drawer.html' %}
    </body>
</html>
