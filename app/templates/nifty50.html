<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Nifty 50 Stocks</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/styles.css">
<link rel="preload" href="/static/js/nifty50.js" as="script">
</head>
<body>
<div class="container">
<header>
<div class="nav-menu" id="navMenu">
<button class="nav-menu-btn" onclick="toggleNavMenu(event)">
<span class="hamburger-icon">
<span></span>
<span></span>
<span></span>
</span>
</button>
<div class="nav-menu-content">
<a href="/" class="nav-menu-item">
<span class="menu-icon">📊</span>Portfolio
</a>
<a href="/nifty50" class="nav-menu-item active">
<span class="menu-icon">📈</span>Nifty 50
</a>
</div>
</div>
</header>

<div class="page-title-bar">
<h1 id="header-title">Nifty 50</h1>
<div class="page-title-right">
    <button class="refresh-btn" id="refresh_btn" onclick="triggerRefresh()">
        <svg class="refresh-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    </button>
    <div id="status_tag" class="">
        <span class="status-dot"></span>
        <span id="status_text">loading...</span>
    </div>
</div>
</div>

<div class="section-wrapper" id="nifty50-section">
<div class="section-header">
<div class="nifty50-controls">
<div class="pagination-controls">
<label for="nifty50_page_size">Show:</label>
<select id="nifty50_page_size" onchange="window.changeNifty50PageSize(this.value)">
<option value="10" selected>10</option>
<option value="25">25</option>
<option value="50">50</option>
<option value="100">All</option>
</select>
</div>
</div>
</div>
<div class="table-scroll-wrapper">
<table id="nifty50Table" aria-label="Nifty 50 table">
<thead>
<tr>
<th data-sort-asc="symbol_asc" data-sort-desc="symbol_desc" data-sort-default="asc">Symbol</th><th data-sort-asc="name_asc" data-sort-desc="name_desc" data-sort-default="asc">Company</th><th data-sort-asc="ltp_asc" data-sort-desc="ltp_desc">LTP</th><th data-sort-asc="change_asc" data-sort-desc="change_desc">Change</th><th data-sort-asc="open_asc" data-sort-desc="open_desc">Open</th><th data-sort-asc="high_asc" data-sort-desc="high_desc">High</th><th data-sort-asc="low_asc" data-sort-desc="low_desc">Low</th><th data-sort-asc="close_asc" data-sort-desc="close_desc">Prev Close</th>
</tr>
</thead>
<tbody id="nifty50_tbody">
<tr class="loading-placeholder" id="nifty50_table_loading"><td colspan="8"><span class="loading-dots">Loading data</span></td></tr>
</tbody>
</table>
</div>
<div class="pagination-info" id="nifty50_pagination_info"></div>
<div class="pagination-buttons" id="nifty50_pagination_buttons"></div>
</div>

<div class="footer-note">
Note: Data is sourced from NSE India and refreshes automatically with your portfolio updates.
</div>
<footer class="site-footer-dashboard">
  <div class="footer-legal-links">
    <a href="/privacy">Privacy Policy</a>
    <span class="footer-dot"></span>
    <a href="/terms">Terms &amp; Conditions</a>
    <span class="footer-dot"></span>
    <a href="/contact">Contact Us</a>
  </div>
  <div class="made-with-love">
    <p>Made with <span class="heart">&hearts;</span> by <a href="https://github.com/thecoducer" target="_blank" rel="noopener"><span class="credit">Mayukh</span></a> &amp; <a href="https://claude.ai" target="_blank" rel="noopener"><span class="credit claude">Claude</span></a></p>
  </div>
</footer>
</div>

<script src="/static/js/nav.js"></script>
<script type="module" src="/static/js/nifty50.js"></script>
</body>
</html>
